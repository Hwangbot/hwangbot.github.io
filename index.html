<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Shop - Flip Cards</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background: url("yourshop-bg.png") no-repeat center center fixed;
      background-size: cover;
    }
    .perspective {
      perspective: 1000px;
    }
    .preserve-3d {
      transform-style: preserve-3d;
    }
    .backface-hidden {
      backface-visibility: hidden;
    }
    .flip-card-inner {
      transition: transform 0.6s;
    }
    .flipped {
      transform: rotateY(180deg);
    }
    .rotate-y-180 {
      transform: rotateY(180deg);
    }
  </style>
</head>
<body class="text-white min-h-screen flex flex-col items-center justify-center p-6">
  <nav class="w-full flex items-center justify-between px-6 py-3 bg-gradient-to-r from-slate-900 to-slate-800 border-b-2 border-yellow-700 shadow-md">
  <div class="flex items-center gap-6">
    <div class="text-yellow-400 font-bold tracking-widest">PLAY</div>
    <a href="https://www.linkedin.com/in/yourusername" target="_blank" class="text-gray-300 hover:text-white transition">LinkedIn</a>
    <a href="https://github.com/yourusername" target="_blank" class="text-gray-300 hover:text-white transition">GitHub</a>
    <a href="#about" class="text-gray-300 hover:text-white transition">About Me</a>
  </div>
</nav>
  <h1 class="text-3xl font-bold mb-10">Timothy Hwangbo</h1>

  <div class="grid grid-cols-2 sm:grid-cols-3 gap-6" id="card-container"></div>


  <script>
    const discounts = [20, 25, 30, 35, 40, 50];
    const container = document.getElementById("card-container");

    discounts.forEach(discount => {
      const card = document.createElement("div");
      card.className = "w-40 h-64 perspective";
      card.innerHTML = `
        <div class="relative w-full h-full preserve-3d flip-card-inner" onclick="this.classList.toggle('flipped')">
          <div class="absolute w-full h-full backface-hidden">
            <img src="yourshop-cardback.png" class="w-full h-full object-cover rounded-xl" />
          </div>
          <div class="absolute w-full h-full rotate-y-180 backface-hidden bg-blue-800 rounded-xl flex items-center justify-center text-center px-2">
            <div>
              <h3 class="text-lg font-bold mb-1">Mystery Skin</h3>
              <p>-${discount}% Discount</p>
            </div>
          </div>
        </div>
      `;
      container.appendChild(card);
    });
  </script>
</body>
</html>
