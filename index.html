<!DOCTYPE html>
<html lang="en">
<head>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&display=swap" rel="stylesheet">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Timothy Hwangbo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@600&display=swap');
    .hover-glow:hover {
      text-shadow: 0 0 8px rgba(255, 223, 102, 0.8);
    }  
    .font-cinzel {
      font-family: 'Cinzel', serif;
    }
    body {
      background: url("yourshop-bg.png") no-repeat center center fixed;
      background-size: cover;
    }
    .perspective {
      perspective: 1000px;
    }
    .preserve-3d {
      transform-style: preserve-3d;
    }
    .backface-hidden {
      backface-visibility: hidden;
    }
    .flip-card-inner {
      transition: transform 0.6s;
    }
    .flipped {
      transform: rotateY(180deg);
    }
    .rotate-y-180 {
      transform: rotateY(180deg);
    }
  </style>
</head>
<body class="text-white min-h-screen flex flex-col items-center justify-start p-6">

  <!-- Navigation Bar -->
  <nav class="w-full flex items-center justify-between px-6 py-1.5 bg-gradient-to-b from-black/70 to-black/10 backdrop-blur-sm border-b border-yellow-600 shadow-sm">
  <!-- Left: Name -->
  <div class="font-cinzel text-[#e6d9ac] text-xl font-bold tracking-widest hover-glow transition duration-300">
    Timothy Hwangbo
  </div>

  <!-- Right: Nav Links -->
  <div class="flex items-center gap-4">
    <a class="font-cinzel text-[#e6d9ac] hover:text-white hover:underline underline-offset-4 decoration-yellow-600 text-sm font-semibold tracking-normal px-3">
      About Me
    </a>
    <a class="font-cinzel text-[#e6d9ac] hover:text-white text-sm font-semibold tracking-normal px-3">
      LinkedIn
    </a>
    <a class="font-cinzel text-[#e6d9ac] hover:text-white text-sm font-semibold tracking-normal px-3">
      GitHub
    </a>
  </div>
</nav>

  <!-- About Me Section at the Top -->
  <div id="about" class="mt-4 text-center text-white max-w-xl">
    <h2 class="text-2xl font-bold mb-2">About Me</h2>
    <p>I’m Timothy Hwangbo, a full-time yapper and LoL enjoyer.</p>
  </div>

  <!-- Card Grid -->
  <div class="grid grid-cols-2 sm:grid-cols-3 gap-4" id="card-container"></div>

  <script>
    const discounts = [20, 25, 30, 35, 40, 50];
    const container = document.getElementById("card-container");

    discounts.forEach(discount => {
      const card = document.createElement("div");
      card.className = "w-40 h-64 perspective hover:scale-105 transition-transform duration-300";
      card.innerHTML = `
        <div class="relative w-full h-full preserve-3d flip-card-inner" onclick="this.classList.toggle('flipped')">
          <div class="absolute w-full h-full backface-hidden">
            <img src="yourshop-cardback.png" class="w-full h-full object-fill" />
          </div>
          <div class="absolute w-full h-full rotate-y-180 backface-hidden bg-blue-800 rounded-xl flex items-center justify-center text-center px-2">
            <div>
              <h3 class="text-lg font-bold mb-1">Mystery Skin</h3>
              <p class="flex items-center justify-center gap-1">
                <img src="assets/rp-icon.png" class="w-4 h-4" /> -${discount}% off
              </p>
              <p class="text-sm text-gray-200 line-through">1350 RP</p>
              <p class="text-yellow-300 font-bold">810 RP</p>
            </div>
          </div>
        </div>
      `;
      container.appendChild(card);
    });
  </script>
</body>
</html>
